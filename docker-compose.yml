version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-events:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_events_data:/var/lib/postgresql/data

  kafka:
    image: confluentinc/cp-kafka:latest
    env_file:
      - .env
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    env_file:
      - .env
    ports:
     - "2181:2181"

  migrate:
    build: .
    command: ./migrate
    env_file:
      - .env
    depends_on:
      - postgres
      - postgres-events

  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - migrate
      - kafka

volumes:
  postgres_data:
  postgres_events_data:
